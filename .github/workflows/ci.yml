name: Windows validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Guard public repository visibility
        shell: pwsh
        run: |
          $event = Get-Content $env:GITHUB_EVENT_PATH -Raw | ConvertFrom-Json
          if ($event.repository.private -eq $true) {
            Write-Host "::error::This repository must stay public and GPL-3.0 open source. Change repository visibility back to public before merging or releasing."
            exit 1
          }
          Write-Host "Repository visibility guard OK: repository is public."

      - name: Run encoding and EOL checks
        shell: pwsh
        run: ./tools/validate.ps1

      - name: Smoke probe — IAS.cmd /silent without action (expect exit 2)
        shell: cmd
        run: |
          chcp 936 >nul
          call IAS.cmd /silent
          if %errorlevel% NEQ 2 (
            echo ::error::IAS.cmd /silent should exit with 2 when no action flag is supplied, got %errorlevel%
            exit /b 1
          )
          echo Smoke probe OK: IAS.cmd /silent exited with 2 as expected.
          exit /b 0

      - name: Smoke probe — IAS.cmd /noupd /silent without IDM installed (expect exit 1)
        shell: cmd
        run: |
          chcp 936 >nul
          call IAS.cmd /noupd /silent
          if %errorlevel% NEQ 1 (
            echo ::error::IAS.cmd /noupd /silent should exit with 1 when IDM is not installed, got %errorlevel%
            exit /b 1
          )
          echo Smoke probe OK: IAS.cmd /noupd /silent exited with 1 as expected.
          exit /b 0
